services:
  # 后端服务
  backend:
    image: 192.168.6.104:5000/alalloy-agent-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: alalloy-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8001
    volumes:
      - ./logs:/app/logs
      - ./backend/reports:/app/reports
    networks:
      - alalloy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    image: 192.168.6.104:5000/alalloy-agent-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BACKEND_HOST: backend
        VITE_BACKEND_PORT: "8001"
        DEV_MODE: ${DEV_MODE:-false}
    container_name: alalloy-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alalloy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  alalloy-network:
    driver: bridge
