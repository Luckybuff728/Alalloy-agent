services:
  backend:
    image: 192.168.7.102:5000/alalloy-agent-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: alalloy-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8001
    volumes:
      - ./logs:/app/logs
      - ./backend/reports:/app/reports
    extra_hosts:
      # 让容器内可通过 host.docker.internal 访问宿主机（MCP 服务等）
      - "host.docker.internal:host-gateway"
    networks:
      - alalloy-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: 192.168.7.102:5000/alalloy-agent-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Supabase 配置在构建时烧入 SPA bundle
        NUXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NUXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NUXT_PUBLIC_AUTH_PROVIDER: ${NUXT_PUBLIC_AUTH_PROVIDER:-both}
    container_name: alalloy-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alalloy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  alalloy-network:
    driver: bridge
