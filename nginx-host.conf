# 宿主机 Nginx 配置 — Alalloy Agent
# 部署位置: /etc/nginx/conf.d/alalloy.conf
#
# ★ 关键说明：
#   必须使用 map + $connection_upgrade 变量传递 WebSocket Upgrade 头
#   直接写 Connection "upgrade" 会导致 WebSocket 握手失败（变量不展开）

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;   # 替换为域名或服务器 IP

    access_log /var/log/nginx/alalloy_access.log;
    error_log  /var/log/nginx/alalloy_error.log;

    # WebSocket（必须在 / 之前定义）
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 86400s;
        proxy_send_timeout    86400s;
        proxy_read_timeout    86400s;
        proxy_buffering off;
        proxy_socket_keepalive on;
    }

    # 其余请求（前端静态文件 + /api）
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
